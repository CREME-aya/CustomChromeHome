<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Nexus Dash</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- サイドバー表示時のオーバーレイ -->
    <div id="sidebar-overlay" class="sidebar-overlay hidden"></div>

    <!-- 折りたたみサイドバー（設定メニュー） -->
    <aside id="sidebar" class="sidebar hidden">
        <div class="sidebar-header">
            <h2>設定</h2>
            <button id="close-sidebar-btn" class="icon-btn">&times;</button>
        </div>
        <div class="sidebar-content">
            <div class="setting-block">
                <label for="preset-rss" class="sidebar-label">おすすめフィードから選択:</label>
                <select id="preset-rss" class="url-input" style="cursor: pointer; padding: 10px;">
                    <option value="">-- カスタム入力 --</option>
                    <option value="https://qiita.com/popular-items/feed">Qiita (トレンド)</option>
                    <option value="https://zenn.dev/feed">Zenn (トレンド)</option>
                    <option value="https://b.hatena.ne.jp/hotentry/it.rss">はてなブックマーク (IT・テクノロジー)</option>
                    <option value="https://rss.itmedia.co.jp/rss/2.0/news_bursts.xml">ITmedia NEWS</option>
                    <option value="https://www.publickey1.jp/atom.xml">Publickey (エンタープライズIT)</option>
                    <option value="https://gigazine.net/news/rss_2.0/">GIGAZINE</option>
                </select>
                <div class="or-text" style="margin: 4px 0;">- またはURLを直接入力 -</div>
                <label for="feed-url-input" class="sidebar-label">RSS/Atom URL:</label>
                <input type="url" id="feed-url-input" placeholder="https://..." class="url-input">
                <button id="save-url-btn" class="save-btn">フィードを更新</button>
            </div>
            
            <hr class="sidebar-divider">

            <div class="setting-block">
                <label class="sidebar-label">背景画像の設定:</label>
                <button id="random-bg-btn" class="outline-btn" style="border-color:#60a5fa; color:#60a5fa;">ランダムな風景（Chrome風）</button>
                <div class="or-text">- または カスタム画像 -</div>
                <input type="url" id="bg-url-input" placeholder="画像URL (https://...)" class="url-input">
                <input type="file" id="bg-file-input" accept="image/*" class="file-input">
                <div class="btn-group">
                    <button id="save-bg-btn" class="save-btn">背景を適用</button>
                    <button id="clear-bg-btn" class="outline-btn">クリア</button>
                </div>
            </div>

            <hr class="sidebar-divider">

            <div class="setting-block">
                <label for="gemini-api-key" class="sidebar-label">Gemini API Key (AI機能用):</label>
                <input type="password" id="gemini-api-key" placeholder="AI Studio APIキー..." class="url-input">
                <button id="save-gemini-btn" class="save-btn" style="background: linear-gradient(135deg, #10b981, #059669);">キーを保存</button>
            </div>
        </div>
    </aside>

    <div class="dashboard">
        <header class="app-header">
            <div class="header-left">
                <button id="menu-btn" class="icon-btn menu-btn">☰</button>
                <h1>Nexus Dash</h1>
            </div>
        </header>

        <div class="dashboard-main">
            <!-- 左側パネル：時計とメモとAI -->
            <div class="left-panel">
                <div class="clock-widget">
                    <div id="time-display" class="time">--:--</div>
                    <div id="date-display" class="date">--月--日</div>
                </div>

                <div class="quick-links-widget">
                    <div id="quick-links-container" class="quick-links-grid">
                        <!-- ここにリンクがJSで生成される -->
                    </div>
                    <button id="add-link-btn" class="add-link-btn" title="ショートカットを追加">+</button>
                </div>

                <div class="memo-widget">
                    <h3>Quick Tasks</h3>
                    <ul id="memo-list" class="memo-list"></ul>
                    <input type="text" id="memo-input" class="memo-input" placeholder="タスクを追加してEnter...">
                </div>

                <div class="gemini-widget">
                    <h3>✨ Gemini Assistant</h3>
                    <div id="gemini-chat-box" class="gemini-chat-box">
                        <div class="chat-msg ai-msg">こんにちは！設定からAPIキーを登録すると、私と会話できるようになります。</div>
                    </div>
                    <div class="gemini-input-group">
                        <input type="text" id="gemini-input" class="memo-input" placeholder="AIに質問する...">
                        <button id="gemini-send-btn" class="send-btn">➤</button>
                    </div>
                </div>
            </div>

            <!-- 右側パネル：記事リスト -->
            <section class="feed-section">
                <div class="section-header">
                <h2 id="feed-title">最新記事</h2>
                <div class="controls-bar">
                    <input type="text" id="search-input" placeholder="記事を検索..." class="search-input">
                    <div class="filter-buttons">
                        <button id="tab-all" class="tab-btn active">すべて</button>
                        <button id="tab-favorites" class="tab-btn">お気に入り</button>
                    </div>
                </div>
            </div>
            <div id="feed-container" class="feed-list">
                <div class="loading">記事を読み込み中...</div>
            </div>
        </section>
        </div> <!-- end dashboard-main -->
    </div>

    <!-- 記事プレビュー用モーダル -->
    <div id="article-modal" class="modal hidden">
        <div class="modal-content">
            <span id="close-modal-btn" class="close-btn">&times;</span>
            <h2 id="modal-title">記事のタイトル</h2>
            <div id="modal-body" class="modal-body">プレビュー内容がここに表示されます。</div>
            <div class="modal-footer">
                <a id="modal-link" href="#" target="_blank" class="read-more-btn">ブラウザで開く</a>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
